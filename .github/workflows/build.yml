name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Verify mesh engine
        run: npm run verify

      - name: TypeScript check
        run: npm run tsc

      - name: Ensure Gradle wrapper
        working-directory: android
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl -L -o /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.6-bin.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
            /tmp/gradle-dist/gradle-8.6/bin/gradle wrapper --gradle-version 8.6
          fi

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: faros-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
